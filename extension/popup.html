<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Don't Do It</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #1e293b, #334155);
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.7;
    }

    .header .logo {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .status-section {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .status-section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status-label {
      font-size: 13px;
      color: #374151;
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .dot-green { background: #10b981; }
    .dot-yellow { background: #f59e0b; }
    .dot-red { background: #ef4444; }
    .dot-gray { background: #9ca3af; }

    .connect-section {
      padding: 16px 20px;
    }

    .connect-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .connect-btn.plaid {
      background: #0a85ea;
      color: #fff;
      margin-bottom: 8px;
    }

    .connect-btn.plaid:hover {
      background: #0770c7;
    }

    .connect-btn.settings {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .connect-btn.settings:hover {
      background: #e5e7eb;
    }

    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">&#x1F436;</div>
    <h1>Dog Don't Do It</h1>
    <p>AI-powered spending vibe check</p>
  </div>

  <div class="status-section">
    <h2>Status</h2>
    <div class="status-row">
      <span class="status-label">Bank connection</span>
      <span class="status-value" id="plaid-status">
        <span class="status-dot dot-gray"></span>Not connected
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Current page</span>
      <span class="status-value" id="page-status">
        <span class="status-dot dot-gray"></span>Checking...
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Vibe check</span>
      <span class="status-value" id="vibe-status">—</span>
    </div>
  </div>

  <div class="connect-section">
    <button class="connect-btn plaid" id="connect-plaid-btn">
      Connect Bank Account
    </button>
    <button class="connect-btn settings" id="settings-btn">
      Settings
    </button>
  </div>

  <div class="footer">
    Dog Don't Do It v0.1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
